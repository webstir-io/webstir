<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta
    name="description"
    content="Standalone Bun.serve proof of concept for the Webstir full demo."
  />
  <title>Webstir Full Demo POC</title>
  <link rel="stylesheet" href="./src/frontend/app/app.css" />
  <style>
    .hero {
      display: grid;
      gap: 2rem;
      align-items: center;
      text-align: center;
      padding: 4rem 1.5rem;
    }

    .hero h1 {
      font-size: clamp(2.5rem, 6vw, 4rem);
      font-weight: 600;
    }

    .hero p {
      font-size: 1.125rem;
      color: var(--text-secondary);
      margin: 0 auto;
      max-width: 42ch;
    }

    .eyebrow {
      font-size: 0.875rem;
      font-weight: 700;
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <main>
    <section class="hero">
      <p class="eyebrow">Webstir full demo</p>
      <h1>Bun.serve() POC</h1>
      <p>
        This page is served directly by Bun's HTML route support. The
        progressive-enhancement demo below is handled by Bun route handlers in
        the same process.
      </p>
      <p><a href="/api/demo/progressive-enhancement">Open the form flow demo</a></p>
    </section>
  </main>
  <script type="module" src="./src/frontend/pages/home/index.ts"></script>
</body>
</html>
