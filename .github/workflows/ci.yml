name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.5

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20.18.1

      - name: Install workspace dependencies
        run: bun install --frozen-lockfile

      - name: Test release tools
        run: bun run test:tools

      - name: Test module contract
        run: bun run --filter @webstir-io/module-contract test

      - name: Test testing contract
        run: bun run --filter @webstir-io/testing-contract test

      - name: Test backend tooling
        run: bun run --filter @webstir-io/webstir-backend test

      - name: Smoke backend tooling scaffold
        run: bun run --filter @webstir-io/webstir-backend smoke
        env:
          WEBSTIR_BACKEND_SMOKE_FASTIFY_RUN: skip

      - name: Test frontend tooling
        run: bun run --filter @webstir-io/webstir-frontend test

      - name: Smoke frontend tooling scaffold
        run: bun run --filter @webstir-io/webstir-frontend smoke

      - name: Test testing tooling
        run: bun run --filter @webstir-io/webstir-testing test

      - name: Check Bun asset sources
        run: bun run --filter @webstir-io/webstir check:assets

      - name: Install Playwright browser
        run: bun x playwright install --with-deps chromium

      - name: Smoke Bun scaffolded flows
        run: bun run --filter @webstir-io/webstir smoke:ci

      - name: Test Bun orchestrator
        run: bun run --filter @webstir-io/webstir test

      - name: Build portal
        run: bun run --filter webstir-portal build

      - name: Build hub frontend
        run: |
          bun run --filter @webstir-io/webstir-frontend build
          node packages/tooling/webstir-frontend/dist/cli.js build --workspace "$GITHUB_WORKSPACE/apps/hub"
