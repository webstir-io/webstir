name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  monorepo:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.5

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.18.1

      - name: Install workspace dependencies
        run: bun install --frozen-lockfile

      - name: Verify framework version alignment
        run: bun run check:framework-versions

      - name: Verify framework package sync
        run: bun run check:framework-sync

      - name: Verify framework embedded sync idempotence
        run: bun run check:framework-embedded-idempotent

      - name: Test release tools
        run: bun run test:tools

      - name: Test module contract
        run: bun run --filter @webstir-io/module-contract test

      - name: Test testing contract
        run: bun run --filter @webstir-io/testing-contract test

      - name: Test backend tooling
        run: bun run --filter @webstir-io/webstir-backend test

      - name: Test frontend tooling
        run: bun run --filter @webstir-io/webstir-frontend test

      - name: Test testing tooling
        run: bun run --filter @webstir-io/webstir-testing test

      - name: Build portal
        run: bun run --filter webstir-portal build

      - name: Build hub frontend
        run: |
          bun run --filter @webstir-io/webstir-frontend build
          node packages/tooling/webstir-frontend/dist/cli.js build --workspace "$GITHUB_WORKSPACE/apps/hub"

  dotnet:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.5

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.18.1

      - name: Set up .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Install workspace dependencies
        run: bun install --frozen-lockfile

      - name: Build solution
        run: dotnet build orchestrators/dotnet/Webstir.sln -v minimal
