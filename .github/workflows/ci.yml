name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.5

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20.18.1

      - name: Resolve CI targets
        id: app-builds
        shell: bash
        run: |
          set -euo pipefail
          args=(--event "${GITHUB_EVENT_NAME}")
          if [ "${GITHUB_EVENT_NAME}" = "pull_request" ]; then
            git fetch --no-tags --depth=1 origin "${{ github.event.pull_request.base.sha }}"
            while IFS= read -r file; do
              [ -n "${file}" ] || continue
              args+=(--changed-file "${file}")
            done < <(git diff --name-only FETCH_HEAD...${GITHUB_SHA})
          fi
          node tools/resolve-ci-app-builds.mjs "${args[@]}" | tee -a "${GITHUB_OUTPUT}"

      - name: Install workspace dependencies
        run: bun install --frozen-lockfile

      - name: Build contract packages
        if: github.event_name == 'pull_request'
        run: bun run build:contracts

      - name: Test release tools
        if: steps.app-builds.outputs.test_release_tools == 'true'
        run: bun run test:tools

      - name: Test module contract
        if: steps.app-builds.outputs.test_module_contract == 'true'
        run: bun run --filter @webstir-io/module-contract test

      - name: Test testing contract
        if: steps.app-builds.outputs.test_testing_contract == 'true'
        run: bun run --filter @webstir-io/testing-contract test

      - name: Test backend tooling
        run: bun run --filter @webstir-io/webstir-backend test

      - name: Smoke backend tooling scaffold
        run: bun run --filter @webstir-io/webstir-backend smoke
        env:
          WEBSTIR_BACKEND_SMOKE_FASTIFY_RUN: skip

      - name: Test frontend tooling
        run: bun run --filter @webstir-io/webstir-frontend test

      - name: Smoke frontend tooling scaffold
        run: bun run --filter @webstir-io/webstir-frontend smoke

      - name: Test testing tooling
        run: bun run --filter @webstir-io/webstir-testing test

      - name: Check Bun asset sources
        run: bun run --filter @webstir-io/webstir check:assets

      - name: Install Playwright browser
        run: bun x playwright install --with-deps chromium

      - name: Smoke Bun scaffolded flows
        if: github.event_name == 'pull_request'
        run: bun run --filter @webstir-io/webstir smoke:ci

      - name: Test Bun orchestrator
        if: github.event_name != 'pull_request'
        run: bun run --filter @webstir-io/webstir test

      - name: Build portal
        if: steps.app-builds.outputs.build_portal == 'true'
        run: bun run --filter webstir-portal build

      - name: Build hub frontend
        if: steps.app-builds.outputs.build_hub == 'true'
        run: |
          bun run --filter @webstir-io/webstir-frontend build
          node packages/tooling/webstir-frontend/dist/cli.js build --workspace "$GITHUB_WORKSPACE/apps/hub"
