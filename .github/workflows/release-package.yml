name: Release Package

on:
  push:
    tags:
      - release/**
  workflow_dispatch:
    inputs:
      package:
        description: Canonical package to publish
        required: true
        type: choice
        options:
          - packages/contracts/module-contract
          - packages/contracts/testing-contract
          - packages/tooling/webstir-backend
          - packages/tooling/webstir-frontend
          - packages/tooling/webstir-testing

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve release package
        id: package
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "push" ]; then
            node tools/resolve-release-package.mjs --tag "${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            node tools/resolve-release-package.mjs --package-dir "${{ inputs.package }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.6.2

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.18.1
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify framework version alignment
        run: pnpm run check:framework-versions

      - name: Verify framework package sync
        run: pnpm run check:framework-sync

      - name: Verify framework embedded sync idempotence
        run: pnpm run check:framework-embedded-idempotent

      - name: Test release tools
        run: pnpm run test:tools

      - name: Show package version
        run: echo "${{ steps.package.outputs.package_name }}@${{ steps.package.outputs.package_version }}"

      - name: Clean package
        run: pnpm --dir "${{ steps.package.outputs.package_dir }}" run --if-present clean

      - name: Build package
        run: pnpm --dir "${{ steps.package.outputs.package_dir }}" run build

      - name: Test package
        run: pnpm --dir "${{ steps.package.outputs.package_dir }}" run test

      - name: Smoke package
        run: pnpm --dir "${{ steps.package.outputs.package_dir }}" run --if-present smoke

      - name: Check registry for existing version
        id: registry
        run: |
          set -euo pipefail
          if npm view "${{ steps.package.outputs.package_name }}@${{ steps.package.outputs.package_version }}" version --registry=https://registry.npmjs.org >/dev/null 2>&1; then
            echo "already_published=true" >> "$GITHUB_OUTPUT"
            echo "${{ steps.package.outputs.package_name }}@${{ steps.package.outputs.package_version }} is already published; skipping npm publish."
          else
            echo "already_published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish package
        if: steps.registry.outputs.already_published != 'true'
        working-directory: ${{ steps.package.outputs.package_dir }}
        run: npm publish --provenance --access public
