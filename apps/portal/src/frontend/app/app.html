<!DOCTYPE html>
<html data-webstir-search-styles="css" lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Documentation for the Webstir full-stack developer experience.">
  <link rel="icon" href="/images/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/app/app.css">
</head>
<body>
  <header class="app-header">
    <div class="app-header__inner ws-container">
      <a class="app-brand" href="/" aria-label="Webstir home">
        <img class="app-brand__mark" src="/images/webstir.svg" alt="" width="28" height="28">
        <span>Webstir</span>
      </a>
      <div class="app-menu" data-app-menu>
        <nav id="app-menu-nav" class="app-nav" aria-label="Primary">
          <a href="/docs/tutorials/getting-started">Tutorials</a>
          <a href="/docs/how-to">How-to</a>
          <a href="/docs/reference">Reference</a>
          <a href="/docs/explanations">Explanations</a>
          <a href="https://github.com/webstir-io/webstir">GitHub</a>
        </nav>
        <button class="app-theme-toggle ws-icon-button" type="button" data-theme-toggle="true" aria-label="Switch to dark theme" title="Switch to dark theme">
          <span class="theme-toggle__icon theme-toggle__icon--light" aria-hidden="true">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="4"></circle>
              <path d="M12 2v2"></path>
              <path d="M12 20v2"></path>
              <path d="M5 5l1.5 1.5"></path>
              <path d="M17.5 17.5L19 19"></path>
              <path d="M2 12h2"></path>
              <path d="M20 12h2"></path>
              <path d="M5 19l1.5-1.5"></path>
              <path d="M17.5 6.5L19 5"></path>
            </svg>
          </span>
          <span class="theme-toggle__icon theme-toggle__icon--dark" aria-hidden="true">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"></path>
            </svg>
          </span>
        </button>
        <button class="app-menu__toggle ws-icon-button" type="button" aria-label="Menu" aria-controls="app-menu-nav" aria-expanded="false">
          <span class="app-menu__icon app-menu__icon--open" aria-hidden="true">
            <svg viewBox="0 0 20 20" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M2 3h16M2 10h16M2 17h16"></path>
            </svg>
          </span>
          <span class="app-menu__icon app-menu__icon--close" aria-hidden="true">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M18 6L6 18"></path>
              <path d="M6 6l12 12"></path>
            </svg>
          </span>
          <span class="sr-only">Menu</span>
        </button>
      </div>
    </div>
  </header>
  <div class="ws-drawer-backdrop" data-drawer="menu" data-drawer-close aria-hidden="true"></div>
  <main></main>
  <footer class="app-footer">
    <div class="ws-container app-footer__inner">
      <p>© 2026 Webstir.</p>
      <nav aria-label="Footer">
        <a href="/docs/tutorials/getting-started">Getting Started</a>
        <a href="/docs/reference/workflows">CLI Workflows</a>
        <a href="https://github.com/webstir-io/webstir">GitHub</a>
      </nav>
    </div>
  </footer>
  <script type="module" src="/app/app.js"></script>
  <script type="module" src="/hmr.js"></script>
  <script src="/refresh.js" async></script>
</body>
</html>
