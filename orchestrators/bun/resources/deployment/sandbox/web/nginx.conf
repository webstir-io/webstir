server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;

  location = /api {
    return 301 /api/;
  }

  location ^~ /api/ {
    proxy_pass http://api:8000/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header Connection "";
  }

  location = / {
    try_files /index.html /pages/home/index.html =404;
    add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    add_header Pragma "no-cache" always;
    add_header Expires "0" always;
  }

  location ~ ^/(?!pages/|app/)([a-zA-Z0-9_-]+)/(.+)$ {
    try_files /pages/$1/$2 /$1/$2 =404;
    expires 7d;
    add_header Cache-Control "public" always;
    add_header Vary "Accept-Encoding" always;
  }

  location ~ ^/(?!pages/|app/)([a-zA-Z0-9_-]+)/?$ {
    try_files /pages/$1/index.html /$1/index.html =404;
    add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    add_header Pragma "no-cache" always;
    add_header Expires "0" always;
  }

  location ^~ /pages/ {
    try_files $uri =404;
  }

  location ^~ /app/ {
    try_files $uri =404;
  }

  location ~* \.[a-f0-9]+\.(css|js|png|jpg|jpeg|gif|svg|webp|ico|woff2?|ttf|otf|eot|mp3|m4a|wav|ogg|mp4|webm|mov)$ {
    expires 1y;
    add_header Cache-Control "public, max-age=31536000, immutable" always;
    add_header Vary "Accept-Encoding" always;
    try_files $uri =404;
  }

  location ~* \.(?:js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|webp|ico)$ {
    expires 7d;
    add_header Cache-Control "public" always;
    add_header Vary "Accept-Encoding" always;
    try_files $uri =404;
  }

  location ~* \.html$ {
    add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    add_header Pragma "no-cache" always;
    add_header Expires "0" always;
    try_files $uri =404;
  }

  location ~* \.map$ {
    return 404;
  }

  location / {
    try_files $uri =404;
  }
}
