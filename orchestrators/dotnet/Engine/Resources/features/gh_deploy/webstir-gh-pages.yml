name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: gh-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node 20.18.1
        uses: actions/setup-node@v4
        with:
          node-version: 20.18.1

      - name: Configure npm auth for npmjs
        if: ${{ env.NPM_TOKEN != '' || env.NODE_AUTH_TOKEN != '' }}
        run: |
          TOKEN="${NPM_TOKEN:-${NODE_AUTH_TOKEN}}"
          NPMRC="${NPM_CONFIG_USERCONFIG:-$HOME/.npmrc}"
          {
            echo "@webstir-io:registry=https://registry.npmjs.org"
            echo "//registry.npmjs.org/:_authToken=${TOKEN}"
          } >> "$NPMRC"

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Deploy
        run: npm run deploy
