name: webstir-sandbox

services:
  certs:
    build:
      context: ./mkcert
    restart: "no"
    environment:
      - OUT=/out
    volumes:
      - ./certs:/out
    networks:
      - webstir

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    depends_on:
      certs:
        condition: service_completed_successfully
      api:
        condition: service_started
    ports:
      - "8080:80"
      - "8443:443"
    volumes:
      # Mount the published frontend assets produced by `webstir publish`
      # Expected structure: dist/frontend/pages/<name>/index.html, etc.
      - ../CLI/out/seed/dist/frontend:/usr/share/nginx/html
      # Serve shared app scripts from published dist
      - ../CLI/out/seed/dist/frontend/app:/usr/share/nginx/html/app:ro
      # Provide an nginx site config that supports clean URLs + brotli
      - ./web/nginx.conf:/etc/nginx/conf.d/default.conf
      # Mount self-signed TLS certs (generated via the `certs` mkcert service)
      - ./certs:/etc/nginx/certs:ro
    networks:
      - webstir

  api:
    image: node:20.19.2-alpine3.22
    working_dir: /app
    command: ["node", "build/backend/index.js"]
    environment:
      # Match Webstir template server expectations
      - PORT=8000
      - WEB_SERVER_URL=http://web
      - API_SERVER_URL=http://api:8000
    volumes:
      # Mount a compiled Node server from the seed project
      - ../CLI/out/seed:/app:ro
    expose:
      - "8000"
    ports:
      - "8000:8000"
    networks:
      - webstir
networks:
  webstir:
    driver: bridge
