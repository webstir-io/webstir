server {
    listen 80;
    server_name _;

    # Root points at Webstir published client assets (mounted by compose)
    root /usr/share/nginx/html;
    index index.html;

    # Brotli is configured in main nginx.conf

    # Security headers (mirror middleware defaults)
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), accelerometer=(), gyroscope=(), magnetometer=(), usb=(), serial=(), payment=(), clipboard-read=()" always;
    # Optional isolation headers (kept enabled in Sandbox to simulate prod)
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Embedder-Policy "require-corp" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;
    # CSP: stricter defaults for Sandbox (keeps inline styles for critical CSS)
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' https: data:; style-src 'self' https: 'unsafe-inline'; script-src 'self' https:; font-src 'self' https: data:; connect-src 'self' https:; object-src 'none'; base-uri 'self'; frame-ancestors 'self'" always;


    # Clean URLs → per-page assets (exclude real /pages and /app paths)
    # Maps any top-level path like /about/* to /pages/about/*
    # Example: /about/index.1234567890.js -> /pages/about/index.1234567890.js
    location ~ ^/(?!pages/|app/)([a-zA-Z0-9_-]+)/(.+)$ {
        try_files /pages/$1/$2 =404;
        expires 7d;
        add_header Cache-Control "public" always;
        add_header Vary "Accept-Encoding" always;
    }

    # Serve home page at "/" without redirect
    location = / {
        try_files /pages/home/index.html =404;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
    }

    # Map root-level index assets to home page assets
    # Example: /index.<hash>.js -> /pages/home/index.<hash>.js
    location ~ ^/index\.[a-f0-9]+\.(css|js)$ {
        try_files /pages/home$uri =404;
        expires 7d;
        add_header Cache-Control "public" always;
        add_header Vary "Accept-Encoding" always;
    }
    location ~ ^/index\.(css|js|map)$ {
        try_files /pages/home$uri =404;
        expires 7d;
        add_header Cache-Control "public" always;
        add_header Vary "Accept-Encoding" always;
    }

    # Serve clean page URLs without trailing slash: /about -> /pages/about/index.html
    location ~ ^/([a-zA-Z0-9_-]+)$ {
        try_files /pages/$1/index.html =404;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
    }

    # Also support trailing slash if present: /about/ -> /pages/about/index.html
    location ~ ^/([a-zA-Z0-9_-]+)/$ {
        try_files /pages/$1/index.html =404;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
    }

    # Special-case router dynamic import from page bundle → shared app/router.js
    location ~ ^/pages/([a-zA-Z0-9_-]+)/router\.js$ {
        try_files /app/router.js =404;
        expires 7d;
        add_header Cache-Control "public" always;
        add_header Vary "Accept-Encoding" always;
    }

    # Direct access to /pages/* (internal structure) – serve as-is
    location /pages/ {
        try_files $uri =404;
    }

    # Long-cache for content-hashed assets (immutable)
    location ~* \.[a-f0-9]+\.(css|js|png|jpg|jpeg|gif|svg|webp|ico|woff2?|ttf|otf|eot|mp3|m4a|wav|ogg|mp4|webm|mov)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        add_header Vary "Accept-Encoding" always;
        try_files $uri =404;
    }

    # Generic static files with cache headers
    location ~* \.(?:js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|webp|ico)$ {
        expires 7d;
        add_header Cache-Control "public" always;
        add_header Vary "Accept-Encoding" always;
        try_files $uri =404;
    }

    # HTML should not be cached; ensure direct /pages/.../index.html gets no-cache
    location ~* \.html$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        try_files $uri =404;
    }

    # Disallow source maps in production
    location ~* \.map$ {
        return 404;
    }

    # Default: no directory listing; 404 when not matched above
    location / {
        try_files $uri =404;
    }
}

# HTTPS server for local simulation (self-signed certs under /etc/nginx/certs)
server {
    listen 443 ssl;
    http2 on;
    server_name _;

    ssl_certificate     /etc/nginx/certs/dev.crt;
    ssl_certificate_key /etc/nginx/certs/dev.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # Root points at Webstir published client assets (mounted by compose)
    root /usr/share/nginx/html;
    index index.html;

    # Brotli is configured in main nginx.conf

